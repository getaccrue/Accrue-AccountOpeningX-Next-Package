version: 1
frontend:
  appRoot: apps/web   # <-- change this to your actual Next.js folder
  phases:
    preBuild:
      commands:
        - node -v
        - npm -v
        - npm i -g pnpm@9.15.5
        - pnpm -v
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .pnpm-store/**/*
      - node_modules/**/*